<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arraiá da Nossa Gente | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <main class="container">
        <img src="assets/images/logo.png" alt="Logo Arraiá" class="logo-login">
        
        <div class="card-login">
            <h2>Acesse o Arraiá</h2>
            <p>Entre para conferir as atrações!</p>

            <form action="menu.html">
                <div class="campo">
                    <input type="text" placeholder="Seu nome ou e-mail" required>
                </div>
                <div class="campo">
                    <input type="password" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="botao-login">ENTRAR</button>
            </form>

            <div class="links-extras">
    <a href="#">Esqueci a senha</a>
    <span> | </span>
    <a href="cadastro.html">Criar conta</a>
</div>
        </div>
    </main>

</body>
</html>
