<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos Teatro | Arraiá da Nossa Gente</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="menu-container">
        <header class="menu-header">
            <a href="teatro.html" class="link-voltar">← Voltar aos Teatros</a>
            <h1 class="titulo-sessao">Reserva de Assento</h1>
        </header>

        <section class="card-compra">
            <div class="ingresso-opcoes">
                <div class="item-ingresso selecionado" style="border-color: #FFB74D; background-color: #FFF8D6; display: flex; align-items: center; padding: 20px; border: 2px solid; border-radius: 15px; margin-bottom: 20px;">
                    <div class="ingresso-info" style="text-align: left; display: flex; flex-direction: column;">
                        <span class="nome" style="font-weight: 700; font-size: 1.2rem; color: #4A4A4A;">Ingresso Plateia (Peça Infantil)</span>
                        <span class="detalhe" style="font-size: 0.9rem; color: #888; margin: 5px 0;">Válido para 1 pessoa. Crianças até 2 anos não pagam se ficarem no colo.</span>
                        <span class="preco" style="font-weight: 700; color: #F57C00; font-size: 1.3rem;">R$ 30,00</span>
                    </div>
                </div>
            </div>

            <div class="resumo-pagamento" style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc;">
                <h3 style="font-size: 1.5rem; margin-bottom: 20px;">Total: <span id="valor-total" style="color: #F57C00;">R$ 30,00</span></h3>
                <button class="botao-finalizar" style="width: 100%; padding: 18px; background-color: #F57C00; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1.1rem;">
                    CONFIRMAR RESERVA
                </button>
            </div>
        </section>
    </main>

    <div id="modal-sucesso" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;">
        <div class="modal-content" style="background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%;">
            <div class="check-icon" style="font-size: 50px; color: #4CAF50; margin-bottom: 20px;">✓</div>
            <h2 style="margin-bottom: 10px;">Lugar Reservado!</h2>
            <p style="color: #666; margin-bottom: 25px;">Prepare a pipoca! Seu ingresso para o teatro foi gerado.</p>
            <button onclick="window.location.href='teatro.html'" class="botao-modal" style="background: #F57C00; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600;">VOLTAR AO TEATRO</button>
        </div>
    </div>

    <script>
        const btnFinalizar = document.querySelector('.botao-finalizar');
        const modal = document.getElementById('modal-sucesso');

        btnFinalizar.addEventListener('click', () => {
            btnFinalizar.innerText = "RESERVANDO...";
            btnFinalizar.style.backgroundColor = "#ccc";
            btnFinalizar.disabled = true;

            // Simula o tempo de processamento
            setTimeout(() => {
                modal.style.display = 'flex';
            }, 1200);
        });
    </script>

</body>
</html>
