<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos | Arraiá da Nossa Gente</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="menu-container">
        <header class="menu-header">
            <a href="menu.html" class="link-voltar">← Voltar ao Menu</a>
            <h1 class="titulo-sessao">Garanta seu lugar</h1>
        </header>

        <section class="card-compra">
            <div class="ingresso-opcoes">
    <label class="item-ingresso">
        <input type="radio" name="tipo-ingresso" value="Pista" data-valor="80" checked>
        <div class="ingresso-info">
            <span class="nome">Pista Comum</span>
            <span class="detalhe">Acesso ao palco principal e praça de alimentação</span>
            <span class="preco">R$ 80,00</span>
        </div>
    </label>

    <label class="item-ingresso">
        <input type="radio" name="tipo-ingresso" value="VIP" data-valor="150">
        <div class="ingresso-info">
            <span class="nome">Área VIP</span>
            <span class="detalhe">Frente do palco + Banheiros exclusivos</span>
            <span class="preco">R$ 150,00</span>
        </div>
    </label>

    <label class="item-ingresso">
        <input type="radio" name="tipo-ingresso" value="Camarote" data-valor="350">
        <div class="ingresso-info">
            <span class="nome">Camarote Open Bar</span>
            <span class="detalhe">Vista privilegiada + Bebidas inclusas</span>
            <span class="preco">R$ 350,00</span>
        </div>
    </label>
</div>

<div class="resumo-pagamento">
    <h3>Total: <span id="valor-total">R$ 80,00</span></h3>
    <button class="botao-finalizar">FINALIZAR COMPRA</button>
</div>
</section>
    </main>

<div id="modal-sucesso" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="check-icon">✓</div>
            <h2>Pedido Confirmado!</h2>
            <p>Seu ingresso foi gerado com sucesso.</p>
            <button onclick="window.location.href='menu.html'" class="botao-modal">VOLTAR AO MENU</button>
        </div>
    </div>

    <script>
        const radios = document.querySelectorAll('input[name="tipo-ingresso"]');
        const displayTotal = document.getElementById('valor-total');
        const btnFinalizar = document.querySelector('.botao-finalizar');
        const modal = document.getElementById('modal-sucesso');

        // Muda o preço quando clica
        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                const valor = radio.getAttribute('data-valor');
                displayTotal.innerText = "R$ " + valor + ",00";
            });
        });

        // Faz o botão finalizar funcionar
        btnFinalizar.addEventListener('click', () => {
            btnFinalizar.innerText = "PROCESSANDO...";
            btnFinalizar.disabled = true;

            setTimeout(() => {
                modal.style.display = 'flex';
            }, 1200);
        });
    </script>
<div id="cursor-fogueira">🔥</div>

<style>
    /* 1. Esconde a seta do mouse em tudo */
    html, body, a, button, input, textarea {
        cursor: none !important;
    }

    /* 2. Estilo da fogueira */
    #cursor-fogueira {
        position: fixed;
        top: 0;
        left: 0;
        font-size: 40px; /* Tamanho da fogueira */
        pointer-events: none; /* Deixa clicar nos botões por trás */
        z-index: 999999;
        transform: translate(-50%, -50%); /* Centraliza no mouse */
        user-select: none;
        line-height: 1;
    }
</style>

<script>
    const fogueira = document.getElementById('cursor-fogueira');

    // Segue o mouse em tempo real
    document.addEventListener('mousemove', (e) => {
        fogueira.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
    });

    // Se o mouse sair da tela, ela some para não ficar travada no canto
    document.addEventListener('mouseleave', () => {
        fogueira.style.display = 'none';
    });
    
    document.addEventListener('mouseenter', () => {
        fogueira.style.display = 'block';
    });
</script>
</body>
</html>
