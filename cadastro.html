<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arraiá da Nossa Gente | Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="container">
        <img src="assets/images/logo.png" alt="Logo Arraiá" class="logo-login">
        
        <div class="card-login">
            <h2>Faça parte da festa!</h2>
            <p>Preencha os dados abaixo para se cadastrar.</p>

            <form action="login.html">
                <div class="campo">
                    <input type="text" placeholder="Nome completo" required>
                </div>
                <div class="campo">
                    <input type="email" placeholder="Seu melhor e-mail" required>
                </div>
                <div class="campo">
                    <input type="password" placeholder="Crie uma senha" required>
                </div>
                <div class="campo">
                    <input type="password" placeholder="Confirme sua senha" required>
                </div>
                
                <button type="submit" class="botao-login">CRIAR CONTA</button>
            </form>

            <div class="links-extras">
                <span>Já tem uma conta? </span>
                <a href="login.html">Faça login aqui</a>
            </div>
        </div>
    </main>
<div id="cursor-fogueira">🔥</div>

<style>
    /* 1. Esconde a seta do mouse em tudo */
    html, body, a, button, input, textarea {
        cursor: none !important;
    }

    /* 2. Estilo da fogueira */
    #cursor-fogueira {
        position: fixed;
        top: 0;
        left: 0;
        font-size: 40px; /* Tamanho da fogueira */
        pointer-events: none; /* Deixa clicar nos botões por trás */
        z-index: 999999;
        transform: translate(-50%, -50%); /* Centraliza no mouse */
        user-select: none;
        line-height: 1;
    }
</style>

<script>
    const fogueira = document.getElementById('cursor-fogueira');

    // Segue o mouse em tempo real
    document.addEventListener('mousemove', (e) => {
        fogueira.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
    });

    // Se o mouse sair da tela, ela some para não ficar travada no canto
    document.addEventListener('mouseleave', () => {
        fogueira.style.display = 'none';
    });
    
    document.addEventListener('mouseenter', () => {
        fogueira.style.display = 'block';
    });
</script>
</body>
</html>
